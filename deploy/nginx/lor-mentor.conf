# Host Nginx reverse proxy for Lor Mentor.
#
# Install:  sudo cp deploy/nginx/lor-mentor.conf /etc/nginx/sites-available/lor-mentor
#           sudo ln -s /etc/nginx/sites-available/lor-mentor /etc/nginx/sites-enabled/
#           sudo nginx -t && sudo systemctl reload nginx
#
# Then provision TLS (this edits the file to add the :443 blocks + redirects):
#           sudo certbot --nginx -d lormentor.com -d www.lormentor.com -d api.lormentor.com
#
# Replace lormentor.com with your real domain before running.

# ── Frontend (Next.js on 127.0.0.1:3000) ────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name lormentor.com www.lormentor.com;

    # Uploaded content proxied through the web app can be large-ish.
    client_max_body_size 12m;

    # Baseline security headers (helmet also sets these on API responses).
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript
               application/xml image/svg+xml;
    gzip_min_length 1024;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }
}

# ── API (NestJS on 127.0.0.1:4000) ──────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name api.lormentor.com;

    # Receipt image uploads (multer caps at 10 MB) go through here.
    client_max_body_size 12m;

    location / {
        proxy_pass http://127.0.0.1:4000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        # NestJS/Express trusts this to build correct callback URLs over HTTPS.
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }
}
