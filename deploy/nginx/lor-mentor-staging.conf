# Host Nginx config for the PRIVATE SOAK period (24–48h before public launch).
#
# Drop-in replacement for lor-mentor.conf while you test on the real domain
# WITHOUT the public being able to browse/sign up. The frontend is gated behind
# HTTP Basic Auth; the API is left open because:
#   - it is already JWT-protected (returns 401 without a valid token), and
#   - the Chapa webhook + Let's Encrypt HTTP-01 challenge must be reachable.
#
# Setup:
#   sudo apt install -y apache2-utils
#   sudo htpasswd -c /etc/nginx/.htpasswd preview     # set a password
#   sudo cp deploy/nginx/lor-mentor-staging.conf /etc/nginx/sites-available/lor-mentor
#   sudo nginx -t && sudo systemctl reload nginx
#   sudo certbot --nginx -d lormentor.com -d www.lormentor.com -d api.lormentor.com
#
# When you're ready to GO PUBLIC: swap back to lor-mentor.conf and reload nginx.
# Replace lormentor.com with your real domain.

# ── Frontend (Next.js) — PRIVATE during soak ────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name lormentor.com www.lormentor.com;

    # Keep it out of search results even if someone finds it.
    add_header X-Robots-Tag "noindex, nofollow" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;

    # Password gate for the whole site.
    auth_basic "Lor Mentor — private preview";
    auth_basic_user_file /etc/nginx/.htpasswd;

    client_max_body_size 12m;
    gzip on;
    gzip_types text/plain text/css application/json application/javascript application/xml image/svg+xml;
    gzip_min_length 1024;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }
}

# ── API (NestJS) — OPEN (JWT-protected; webhooks must reach it) ──────
server {
    listen 80;
    listen [::]:80;
    server_name api.lormentor.com;

    client_max_body_size 12m;

    location / {
        proxy_pass http://127.0.0.1:4000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }
}
